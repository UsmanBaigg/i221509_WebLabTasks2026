<!DOCTYPE html>
<html>
<head>
<title>Mini Kanban Board</title>

<style>

body{
font-family: Arial;
text-align:center;
}

.board{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.column{
width:30%;
background:#f2f2f2;
padding:10px;
border-radius:10px;
min-height:250px;
}

.task{
background:white;
padding:8px;
margin:6px;
border-radius:5px;
cursor:grab;
}

.low{border-left:6px solid green;}
.medium{border-left:6px solid orange;}
.high{border-left:6px solid red;}

</style>
</head>

<body>

<h2>Kanban Board</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<button onclick="addTask()">Add Task</button>

<div class="board">

<div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>To-Do</h3>
</div>

<div class="column" id="progress" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>In Progress</h3>
</div>

<div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
<h3>Done</h3>
</div>

</div>

<script src="q3.js"></script>

</body>
</html>
