<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4: Dynamic Table Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        .generator {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-width: 620px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .generator h2 {
            margin: 0 15px 0 0;
            font-size: 18px;
        }
        input[type="number"] {
            width: 90px;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #error {
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }
        #tableContainer {
            max-width: 800px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            font-size: 15px;
        }
        .even {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Task 4: Dynamic Table Generator</h1>

    <div class="generator">
        <h2>Dynamic Table Generator</h2>
        <label>Rows: <input type="number" id="rows" value="5" min="1" max="50"></label>
        <label>Columns: <input type="number" id="cols" value="2" min="1" max="50"></label>
        <button id="generateBtn">Generate Table</button>
        <div id="error"></div>
    </div>

    <div id="tableContainer"></div>

    <script src="q4.js"></script>
</body>
</html>
