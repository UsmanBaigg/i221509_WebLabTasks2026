<!DOCTYPE html>
<html>
<head>
<title>Interactive Quiz</title>
<style>

body{
font-family: Arial;
text-align:center;
margin:40px;
}

#quiz-box{
width:500px;
margin:auto;
padding:20px;
border:1px solid #ccc;
border-radius:10px;
}

button{
margin:5px;
padding:10px;
}

#progressBar{
width:100%;
height:20px;
background:#ddd;
border-radius:10px;
margin-top:15px;
}

#progress{
height:100%;
width:0%;
background:green;
border-radius:10px;
}

.correct{
background:#b6f3b6;
}

.wrong{
background:#f5b5b5;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #aaa;
padding:8px;
}

</style>
</head>

<body>

<h2>Interactive Quiz</h2>

<div id="quiz-box">

<h3 id="question"></h3>

<div id="options"></div>

<div id="progressBar">
<div id="progress"></div>
</div>

</div>

<div id="result"></div>

<script src="q2.js"></script>

</body>
</html>
